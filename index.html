<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cosétika — Panel de Ventas</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--brown:#A0684A;--brown-dark:#1a0e08;--bl:rgba(160,104,74,0.12);--bg:#f4f1ee;--card:#fff;--text:#1a1a1a;--muted:#6b6b6b;--border:rgba(0,0,0,0.08)}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .header{background:var(--brown-dark);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--brown)}
    .logo{display:flex;align-items:center;gap:10px}
    .logo-c{width:40px;height:40px;background:var(--brown);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:700;color:#fff;font-style:italic;font-family:Georgia,serif;flex-shrink:0}
    .logo-name{font-size:17px;font-weight:500;letter-spacing:2px;color:#fff}
    .logo-sl{font-size:9px;color:#fff;letter-spacing:1px}
    .hdr-right{display:flex;align-items:center;gap:8px}
    .badge{background:rgba(160,104,74,0.25);border:1px solid var(--brown);color:#c9a07a;font-size:11px;padding:3px 10px;border-radius:20px}
    .icon-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px}
    .icon-btn:hover{background:var(--brown)}

    /* MÓDULOS PRINCIPALES */
    .mods{display:grid;grid-template-columns:repeat(5,1fr);background:#fff;border-bottom:1px solid var(--border)}
    .mod{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;cursor:pointer;border-bottom:3px solid transparent;color:var(--muted);font-size:11px;font-weight:500;transition:all 0.2s}
    .mod.active{border-bottom-color:var(--brown);color:var(--brown)}
    .mod i{font-size:20px}

    /* SUBMENÚ DE VENTAS */
    .submenu{display:none;background:#faf9f8;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
    .submenu::-webkit-scrollbar{display:none}
    .submenu.visible{display:flex}
    .stab{padding:8px 18px;font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:all 0.2s}
    .stab:hover{color:var(--text)}
    .stab.active{color:var(--brown);border-bottom-color:var(--brown)}

    .body{display:grid;grid-template-columns:170px 1fr;min-height:calc(100vh - 120px)}.body.full-width{grid-template-columns:1fr}
    .sidebar{background:#fff;border-right:1px solid var(--border);padding:12px 10px;overflow-y:auto}
    .sidebar.hidden{display:none}
    .sb-title{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
    .vend-item{display:flex;align-items:center;gap:6px;padding:5px 7px;border-radius:6px;cursor:pointer;font-size:11px;color:var(--text);margin-bottom:1px;transition:background 0.15s}
    .vend-item:hover{background:#faf9f8}
    .vend-item.active{background:var(--bl);color:var(--brown);font-weight:500}
    .vend-item input{accent-color:var(--brown);width:12px;height:12px;flex-shrink:0}
    .marca-sec{margin-top:14px}
    .marca-row{margin-bottom:7px}
    .marca-hdr{display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px}
    .marca-name{color:var(--muted)}
    .marca-val{color:var(--brown);font-weight:600}
    .marca-track{height:5px;background:#f0ede9;border-radius:2px}
    .marca-fill{height:100%;border-radius:2px}

    .main{padding:12px 14px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;overflow-x:hidden}
    .card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px;overflow:hidden}
    .card-title{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:flex;align-items:center;gap:5px}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .kpi{background:#faf9f8;border:1px solid var(--border);border-radius:8px;padding:10px 12px}
    .kpi-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
    .kpi-val{font-size:17px;font-weight:600;color:var(--text);margin-top:2px}
    .kpi-sub{font-size:10px;color:#3B6D11;margin-top:1px}

    .hbar{display:flex;align-items:center;gap:6px;margin-bottom:5px;cursor:pointer;border-radius:5px;padding:2px 4px;transition:background 0.15s;overflow:hidden}
    .hbar:hover{background:#faf9f8}
    .hbar-lbl{font-size:11px;color:var(--text);width:120px;min-width:120px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .hbar-track{flex:1;height:14px;background:#f0ede9;border-radius:3px;overflow:hidden;min-width:0}
    .hbar-fill{height:100%;border-radius:3px;background:#5a8fa3;transition:width 0.4s;max-width:100%}
    .hbar-fill.brown{background:var(--brown)}
    .hbar-val{font-size:11px;color:var(--muted);min-width:60px;max-width:70px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    .prod-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;overflow:hidden}
    .prod-name{font-size:11px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
    .prod-bar{width:50px;min-width:50px;height:9px;background:#f0ede9;border-radius:2px;flex-shrink:0;overflow:hidden}
    .prod-fill{height:100%;border-radius:2px;background:#7ab3c4;max-width:100%}
    .prod-qty{font-size:11px;color:var(--muted);min-width:28px;text-align:right;flex-shrink:0}

    .freq-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;overflow:hidden}
    .freq-lbl{font-size:10px;color:var(--muted);width:36px;min-width:36px;text-align:right;flex-shrink:0}
    .freq-track{flex:1;height:18px;background:#f0ede9;border-radius:3px;overflow:hidden;min-width:0}
    .freq-fill{height:100%;border-radius:3px;background:var(--brown);display:flex;align-items:center;padding-left:7px;transition:width 0.4s;min-width:0;max-width:100%}
    .freq-fill span{font-size:10px;color:#fff;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .freq-count{font-size:10px;color:var(--muted);min-width:55px;flex-shrink:0}

    .breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);flex-wrap:wrap}
    .crumb{color:var(--brown);cursor:pointer}
    .crumb:hover{text-decoration:underline}
    .cli-header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bl);border:1px solid rgba(160,104,74,0.25);border-radius:8px;overflow:hidden}
    .cli-avatar{width:36px;height:36px;border-radius:50%;background:rgba(160,104,74,0.2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--brown);flex-shrink:0}
    .cli-name{font-size:14px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .cli-sub{font-size:11px;color:var(--muted)}
    .back-btn{margin-left:auto;background:none;border:1px solid var(--brown);color:var(--brown);font-size:11px;padding:5px 12px;border-radius:20px;cursor:pointer;display:flex;align-items:center;gap:4px;flex-shrink:0}
    .back-btn:hover{background:var(--bl)}
    .loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:12px;color:var(--muted)}
    .loader i{font-size:36px;color:var(--brown);animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .coming{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:12px;color:var(--muted)}
    .coming i{font-size:48px;color:rgba(160,104,74,0.3)}


    .sort-btn{padding:4px 10px;font-size:10px;border-radius:6px;border:1px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;transition:all 0.2s}
    .sort-btn.active-sort{background:var(--brown);color:#fff;border-color:var(--brown)}
    @media(max-width:640px){
      .body{grid-template-columns:1fr}
      .sidebar{display:none}
      .kpi-row{grid-template-columns:repeat(2,1fr)}
      .row2{grid-template-columns:1fr}
      .hbar-lbl{width:90px;min-width:90px}
      .hbar-val{min-width:50px}
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-c">C</div>
    <div>
      <div class="logo-name">COSÉTIKA</div>
      <div class="logo-sl">Innovación Europea en Belleza</div>
    </div>
  </div>
  <div class="hdr-right">
    <div class="badge" id="badge-periodo">Ene–May 2026</div>
    <div class="icon-btn" title="Administración" onclick="alert('Panel admin próximamente')"><i class="ti ti-settings"></i></div>
  </div>
</div>

<div class="mods">
  <div class="mod active" id="mod-ventas" onclick="setMod('ventas')"><i class="ti ti-chart-bar"></i>Ventas</div>
  <div class="mod" onclick="setMod('inventarios')"><i class="ti ti-package"></i>Inventarios</div>
  <div class="mod" onclick="setMod('clientes')"><i class="ti ti-building"></i>Clientes</div>
  <div class="mod" onclick="setMod('visitas')"><i class="ti ti-map-pin"></i>Visitas</div>
  <div class="mod" onclick="setMod('reportes')"><i class="ti ti-file-analytics"></i>Reportes</div>
</div>

<div class="submenu" id="submenu-ventas">
  <div class="stab active" id="stab-cpf" onclick="setSubtab('cpf')">Clientes, Productos y Frecuencia</div>
  <div class="stab" id="stab-prov" onclick="setSubtab('prov')">Clientes por Provincia</div>
</div>

<div class="body" id="body">
  <div class="sidebar" id="sidebar">
    <div class="sb-title">Vendedor</div>
    <div id="vend-list"></div>
    <div class="marca-sec">
      <div class="sb-title" style="margin-top:4px">Marca</div>
      <div id="marcas-sb"></div>
    </div>
  </div>
  <div class="main" id="main"></div>
</div>

<script>
const MESES={1:'Ene',2:'Feb',3:'Mar',4:'Abr',5:'May',6:'Jun',7:'Jul',8:'Ago',9:'Sep',10:'Oct',11:'Nov',12:'Dic'};
const fmt=n=>'$'+Number(n).toLocaleString('es-EC',{minimumFractionDigits:2,maximumFractionDigits:2});
const pct=(v,mx)=>mx?Math.min(Math.round((v/mx)*100),100):0;
const EXCLUIR=['Fernando Espíndola','Fernando Espindola'];

let DATA={};
let vendActual=null;
let modActual='ventas';
let subtabActual='home'; // home = resumen general

async function cargarData(){
  document.getElementById('main').innerHTML='<div class="loader"><i class="ti ti-refresh"></i><p>Cargando data...</p></div>';
  try{
    const r=await fetch('/data.json');
    DATA=await r.json();
    // Excluir Fernando
    EXCLUIR.forEach(e=>delete DATA[e]);
    initVendedoras();
  }catch(e){
    document.getElementById('main').innerHTML='<div class="loader"><p>Error: '+e.message+'</p></div>';
  }
}

function setMod(mod){
  document.querySelectorAll('.mod').forEach(m=>m.classList.remove('active'));
  document.getElementById('mod-'+mod)?.classList.add('active');
  modActual=mod;
  
  // Mostrar/ocultar submenu
  document.getElementById('submenu-ventas').classList.toggle('visible', mod==='ventas');
  
  if(mod==='ventas'){
    document.getElementById('sidebar').classList.remove('hidden');
    document.getElementById('body').classList.remove('full-width');
    renderHome();
  } else if(mod==='visitas'){
    document.getElementById('sidebar').classList.add('hidden');
    document.getElementById('body').classList.add('full-width');
    renderVisitas();
  } else {
    document.getElementById('sidebar').classList.add('hidden');
    document.getElementById('body').classList.add('full-width');
    document.getElementById('main').innerHTML=`
      <div class="coming">
        <i class="ti ti-tools"></i>
        <p>Módulo de ${mod.charAt(0).toUpperCase()+mod.slice(1)}</p>
        <span style="font-size:12px">Próximamente</span>
      </div>`;
  }
}

function setSubtab(tab){
  document.querySelectorAll('.stab').forEach(s=>s.classList.remove('active'));
  document.getElementById('stab-'+tab)?.classList.add('active');
  subtabActual=tab;
  
  if(tab==='cpf'){
    if(vendActual) renderVendedor(vendActual);
    else renderHome();
  } else if(tab==='prov'){
    renderProvincias();
  }
}

function initVendedoras(){
  const vendedoras=Object.keys(DATA);
  const list=document.getElementById('vend-list');
  list.innerHTML=`
    <div class="vend-item active" id="vi-todo" onclick="selVendedorTodo(this)">
      <input type="checkbox" checked/>
      <span>(Todo)</span>
    </div>`+
    vendedoras.map(v=>`
    <div class="vend-item" onclick="selVendedor(this,'${v.replace(/'/g,"\\'")}')">
      <input type="checkbox"/>
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${v}</span>
    </div>`).join('');
  
  // Mostrar submenu de ventas
  document.getElementById('submenu-ventas').classList.add('visible');
  renderHome();
}

function selVendedorTodo(el){
  document.querySelectorAll('.vend-item').forEach(v=>{v.classList.remove('active');v.querySelector('input').checked=false});
  el.classList.add('active');
  el.querySelector('input').checked=true;
  vendActual=null;
  if(subtabActual==='prov') renderProvincias();
  else renderHome();
}

function selVendedor(el,nombre){
  document.querySelectorAll('.vend-item').forEach(v=>{v.classList.remove('active');v.querySelector('input').checked=false});
  el.classList.add('active');
  el.querySelector('input').checked=true;
  vendActual=nombre;
  if(subtabActual==='prov') renderProvincias();
  else renderVendedor(nombre);
}

function selVendedorPorNombre(nombre){
  document.querySelectorAll('.vend-item').forEach(el=>{
    el.classList.remove('active');
    el.querySelector('input').checked=false;
    if(el.textContent.trim()===nombre){
      el.classList.add('active');
      el.querySelector('input').checked=true;
    }
  });
  vendActual=nombre;
  // Activar subtab cpf
  document.querySelectorAll('.stab').forEach(s=>s.classList.remove('active'));
  document.getElementById('stab-cpf').classList.add('active');
  subtabActual='cpf';
  renderVendedor(nombre);
}

function renderMarcasSidebar(marcas){
  const maxM=Math.max(...Object.values(marcas),1);
  document.getElementById('marcas-sb').innerHTML=Object.entries(marcas)
    .sort((a,b)=>b[1]-a[1])
    .map(([m,t])=>`
      <div class="marca-row">
        <div class="marca-hdr"><span class="marca-name">${m}</span><span class="marca-val">${fmt(t)}</span></div>
        <div class="marca-track"><div class="marca-fill" style="width:${pct(t,maxM)}%;background:var(--brown)"></div></div>
      </div>`).join('');
}

function renderHome(){
  subtabActual='home';
  document.querySelectorAll('.stab').forEach(s=>s.classList.remove('active'));
  
  const vendedoras=Object.keys(DATA);
  const totalGlobal=vendedoras.reduce((a,v)=>a+DATA[v].reduce((b,c)=>b+c.total,0),0);
  const totalClientes=vendedoras.reduce((a,v)=>a+DATA[v].length,0);
  const totalFacturas=vendedoras.reduce((a,v)=>a+DATA[v].reduce((b,c)=>b+c.num_compras,0),0);

  const marcas={};
  vendedoras.forEach(v=>DATA[v].forEach(c=>c.marcas.forEach(m=>{marcas[m.marca]=(marcas[m.marca]||0)+m.total;})));
  renderMarcasSidebar(marcas);

  const ranking=vendedoras.map(v=>({
    nombre:v,
    total:DATA[v].reduce((a,c)=>a+c.total,0),
    clientes:DATA[v].length,
    facturas:DATA[v].reduce((a,c)=>a+c.num_compras,0)
  })).sort((a,b)=>b.total-a.total);
  const maxVend=ranking[0]?.total||1;

  document.getElementById('main').innerHTML=`
    <div class="breadcrumb"><i class="ti ti-home" style="font-size:12px;color:var(--brown)"></i><span style="font-weight:500">Resumen general — Ene–May 2026</span></div>
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-label">Ventas totales</div><div class="kpi-val">${fmt(totalGlobal)}</div><div class="kpi-sub">Ene–May 2026</div></div>
      <div class="kpi"><div class="kpi-label">Vendedoras</div><div class="kpi-val">${vendedoras.length}</div><div class="kpi-sub">activas</div></div>
      <div class="kpi"><div class="kpi-label">Clientes</div><div class="kpi-val">${totalClientes}</div><div class="kpi-sub">únicos</div></div>
      <div class="kpi"><div class="kpi-label">Facturas</div><div class="kpi-val">${totalFacturas}</div><div class="kpi-sub">emitidas</div></div>
    </div>
    <div class="card">
      <div class="card-title"><i class="ti ti-award"></i> Ranking de vendedoras</div>
      ${ranking.map(v=>`
        <div class="hbar" onclick="selVendedorPorNombre('${v.nombre.replace(/'/g,"\\'")}')">
          <span class="hbar-lbl" title="${v.nombre}">${v.nombre}</span>
          <div class="hbar-track"><div class="hbar-fill brown" style="width:${pct(v.total,maxVend)}%"></div></div>
          <span class="hbar-val">${fmt(v.total)}</span>
        </div>`).join('')}
    </div>
    <div class="row2">
      <div class="card">
        <div class="card-title"><i class="ti ti-users"></i> Clientes por vendedora</div>
        ${ranking.map(v=>`
          <div class="hbar" onclick="selVendedorPorNombre('${v.nombre.replace(/'/g,"\\'")}')">
            <span class="hbar-lbl" title="${v.nombre}">${v.nombre}</span>
            <div class="hbar-track"><div class="hbar-fill" style="width:${pct(v.clientes,ranking[0].clientes)}%"></div></div>
            <span class="hbar-val">${v.clientes} cli.</span>
          </div>`).join('')}
      </div>
      <div class="card">
        <div class="card-title"><i class="ti ti-receipt"></i> Facturas por vendedora</div>
        ${ranking.map(v=>`
          <div class="hbar" onclick="selVendedorPorNombre('${v.nombre.replace(/'/g,"\\'")}')">
            <span class="hbar-lbl" title="${v.nombre}">${v.nombre}</span>
            <div class="hbar-track"><div class="hbar-fill" style="width:${pct(v.facturas,ranking[0].facturas)}%"></div></div>
            <span class="hbar-val">${v.facturas} fact.</span>
          </div>`).join('')}
      </div>
    </div>`;
}

function renderVendedor(nombre){
  const clientes=DATA[nombre]||[];
  const totalVend=clientes.reduce((a,c)=>a+c.total,0);
  const maxTotal=clientes[0]?.total||1;
  const marcas={};
  clientes.forEach(c=>c.marcas.forEach(m=>{marcas[m.marca]=(marcas[m.marca]||0)+m.total;}));
  renderMarcasSidebar(marcas);

  document.getElementById('main').innerHTML=`
    <div class="breadcrumb">
      <span class="crumb" onclick="renderHome()"><i class="ti ti-home" style="font-size:12px"></i> Inicio</span>
      <span> › </span>
      <span style="font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${nombre}</span>
    </div>
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-label">Total ventas</div><div class="kpi-val">${fmt(totalVend)}</div><div class="kpi-sub">Ene–May 2026</div></div>
      <div class="kpi"><div class="kpi-label">Clientes</div><div class="kpi-val">${clientes.length}</div><div class="kpi-sub">activos</div></div>
      <div class="kpi"><div class="kpi-label">Facturas</div><div class="kpi-val">${clientes.reduce((a,c)=>a+c.num_compras,0)}</div><div class="kpi-sub">emitidas</div></div>
      <div class="kpi"><div class="kpi-label">Ticket prom.</div><div class="kpi-val">${fmt(totalVend/Math.max(clientes.reduce((a,c)=>a+c.num_compras,0),1))}</div><div class="kpi-sub">por factura</div></div>
    </div>
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px">
        <div class="card-title" style="margin-bottom:0"><i class="ti ti-users"></i> Monto por cliente</div>
        <div style="display:flex;gap:4px">
          <button class="sort-btn active-sort" id="sort-v-monto" onclick="sortVend('monto')">Mayor $ primero</button>
          <button class="sort-btn" id="sort-v-az" onclick="sortVend('az')">A → Z</button>
        </div>
      </div>
      <div id="cli-list-vend">
        ${clientes.map(c=>`
          <div class="hbar" onclick="selCliente('${c.nombre.replace(/'/g,"\\'").replace(/"/g,'\\"')}')">
            <span class="hbar-lbl" title="${c.nombre}">${c.nombre}</span>
            <div class="hbar-track"><div class="hbar-fill" style="width:${pct(c.total,maxTotal)}%"></div></div>
            <span class="hbar-val">${fmt(c.total)}</span>
          </div>`).join('')}
      </div>
    </div>`;
}

function selCliente(nombre){
  const clientes=DATA[vendActual]||[];
  const c=clientes.find(x=>x.nombre===nombre);
  if(!c)return;
  const maxProd=c.productos[0]?.cantidad||1;
  const maxFreq=Math.max(...c.frecuencia.map(f=>f.total),1);
  const iniciales=nombre.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();

const DIAS_SECTOR = 30;
const DIAS_PROV = 60;
let visitasDB = [];
let asesoraVisitas = null;

async function cargarVisitas(){
  try {
    const r = await fetch('/api/visitas');
    visitasDB = await r.json();
  } catch(e) { visitasDB = []; }
}

function diasDesde(fechaStr){
  if(!fechaStr) return 9999;
  return Math.floor((Date.now() - new Date(fechaStr)) / 86400000);
}

function ultimaVisita(lugar){
  const v = visitasDB.filter(x=>x.lugar===lugar).sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
  return v[0]?.fecha || null;
}

function estadoLugar(lugar, tipo){
  const limite = tipo==='provincia' ? DIAS_PROV : DIAS_SECTOR;
  const d = diasDesde(ultimaVisita(lugar));
  if(d===9999) return 'none';
  if(d < limite*0.5) return 'fresh';
  if(d < limite) return 'ok';
  return 'warn';
}

function fmtFecha(f){
  if(!f) return '—';
  return new Date(f).toLocaleDateString('es-EC',{day:'2-digit',month:'short',year:'2-digit'});
}

function diasLabel(lugar){
  const d = diasDesde(ultimaVisita(lugar));
  if(d===9999) return 'Sin visita';
  if(d===0) return 'Hoy';
  return `Hace ${d}d`;
}

      <div style="display:flex;flex-direction:column;gap:12px">
        <div class="card">
          <div class="card-title"><i class="ti ti-world" aria-hidden="true"></i> Provincias asignadas</div>
          ${provsHtml}
        </div>
        <div class="card">
          <div class="card-title"><i class="ti ti-history" aria-hidden="true"></i> Historial de visitas</div>
          ${histHtml}
        </div>
      </div>
    </div>

    <div id="modal-visita" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center;padding:20px">
      <div style="background:white;border-radius:12px;border:0.5px solid var(--border);width:100%;max-width:400px;max-height:80vh;overflow-y:auto">
        <div style="padding:14px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between">
          <div id="mv-title" style="font-size:14px;font-weight:500;color:var(--text)"></div>
          <button onclick="cerrarModalVisita()" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px"><i class="ti ti-x" aria-hidden="true"></i></button>
        </div>
        <div id="mv-body" style="padding:16px"></div>
      </div>
    </div>`;

  document.getElementById('modal-visita').addEventListener('click', function(e){
    if(e.target===this) cerrarModalVisita();
  });
}

function selAsesoraVisitas(nombre, el){
  asesoraVisitas = nombre;
  renderVisitas();
}

function cerrarModalVisita(){
  const m = document.getElementById('modal-visita');
  if(m) m.style.display='none';
}

async function abrirModalVisita(lugar, tipo, asesora){
  const visLugar = visitasDB.filter(v=>v.lugar===lugar).sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
  const ult = visLugar[0];
  const dias = diasDesde(ult?.fecha);
  const limite = tipo==='provincia'?DIAS_PROV:DIAS_SECTOR;

  document.getElementById('mv-title').innerHTML = `<i class="ti ti-${tipo==='provincia'?'world':'map-pin'}" aria-hidden="true" style="color:#A0684A"></i> ${lugar}`;
  document.getElementById('mv-body').innerHTML = `
    <div style="display:flex;gap:10px;margin-bottom:14px">
      <div style="flex:1;background:#faf9f8;border-radius:8px;padding:10px;text-align:center">
        <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">Última visita</div>
        <div style="font-size:14px;font-weight:500;margin-top:4px">${ult?fmtFecha(ult.fecha):'—'}</div>
      </div>
      <div style="flex:1;background:#faf9f8;border-radius:8px;padding:10px;text-align:center">
        <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">Días transcurridos</div>
        <div style="font-size:14px;font-weight:500;color:${dias>=limite?'#991b1b':'#166534'};margin-top:4px">${dias===9999?'—':dias+'d'}</div>
      </div>
    </div>
    ${visLugar.length?`
      <div style="font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Historial</div>
      ${visLugar.slice(0,5).map(v=>`
        <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--border);font-size:12px">
          <span style="flex:1">${v.asesora.split(' ')[0]}</span>
          <span style="color:var(--muted)">${fmtFecha(v.fecha)}</span>
        </div>`).join('')}`:'<p style="font-size:12px;color:var(--muted);margin-bottom:12px">Sin visitas previas</p>'}
    <button onclick="marcarVisitaDB('${lugar.replace(/'/g,"\'")}','${tipo}','${asesora.replace(/'/g,"\'")}',this)"
      style="background:#A0684A;color:white;border:none;padding:10px 16px;border-radius:8px;font-size:13px;cursor:pointer;width:100%;margin-top:14px">
      <i class="ti ti-check" aria-hidden="true"></i> Marcar como visitado hoy
    </button>`;

  document.getElementById('modal-visita').style.display='flex';
}

async function marcarVisitaDB(lugar, tipo, asesora, btn){
  btn.disabled=true;
  btn.textContent='Guardando...';
  try {
    await fetch('/api/visitas', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({lugar, tipo, asesora})
    });
    cerrarModalVisita();
    await renderVisitas();
  } catch(e) {
    btn.disabled=false;
    btn.textContent='Error — intenta de nuevo';
  }
}

// ─── AUTH ───────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  const usuarioActual = JSON.parse(sessionStorage.getItem('cosetika_usuario') || 'null');
  if (!usuarioActual) { window.location.href = '/login'; return; }
  
  // Saludo
  const nombre = usuarioActual.nombre.split(' ')[0];
  const badge = document.getElementById('badge-periodo');
  if (badge) badge.innerHTML = `Hola, ${nombre} &nbsp;·&nbsp; Ene–May 2026`;

  // Botón settings
  const settingsBtn = document.querySelector('.icon-btn');
  if (settingsBtn) {
    if (usuarioActual.rol === 'admin') {
      settingsBtn.title = 'Configuración';
      settingsBtn.onclick = () => setMod('config');
    } else {
      settingsBtn.title = 'Cerrar sesión';
      settingsBtn.onclick = () => { if(confirm('¿Cerrar sesión?')){ sessionStorage.clear(); window.location.href='/login'; }};
    }
  }

  // Mostrar módulos según permisos
  const modulos = usuarioActual.modulos ? usuarioActual.modulos.split(',') : [];
  document.querySelectorAll('.mod').forEach(m => {
    const id = m.id.replace('mod-', '');
    if (id === 'config') {
      m.style.display = usuarioActual.rol === 'admin' ? 'flex' : 'none';
    } else if (id && !modulos.includes(id)) {
      m.style.display = 'none';
    }
  });

  // Guardar usuario globalmente
  window.usuarioActual = usuarioActual;
  cargarData();
});
</script>
</body>
</html>
