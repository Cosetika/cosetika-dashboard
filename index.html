<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cosétika — Panel de Ventas</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--brown:#A0684A;--brown-dark:#1a0e08;--bl:rgba(160,104,74,0.12);--bg:#f4f1ee;--card:#fff;--text:#1a1a1a;--muted:#6b6b6b;--border:rgba(0,0,0,0.08)}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .header{background:var(--brown-dark);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--brown)}
    .logo{display:flex;align-items:center;gap:10px}
    .logo-c{width:40px;height:40px;background:var(--brown);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:700;color:#fff;font-style:italic;font-family:Georgia,serif;flex-shrink:0}
    .logo-name{font-size:17px;font-weight:500;letter-spacing:2px;color:#fff}
    .logo-sl{font-size:9px;color:#fff;letter-spacing:1px}
    .hdr-right{display:flex;align-items:center;gap:8px}
    .badge{background:rgba(160,104,74,0.25);border:1px solid var(--brown);color:#c9a07a;font-size:11px;padding:3px 10px;border-radius:20px}
    .icon-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px}
    .icon-btn:hover{background:var(--brown)}

    /* MÓDULOS PRINCIPALES */
    .mods{display:grid;grid-template-columns:repeat(5,1fr);background:#fff;border-bottom:1px solid var(--border)}
    .mod{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;cursor:pointer;border-bottom:3px solid transparent;color:var(--muted);font-size:11px;font-weight:500;transition:all 0.2s}
    .mod.active{border-bottom-color:var(--brown);color:var(--brown)}
    .mod i{font-size:20px}

    /* SUBMENÚ DE VENTAS */
    .submenu{display:none;background:#faf9f8;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
    .submenu::-webkit-scrollbar{display:none}
    .submenu.visible{display:flex}
    .stab{padding:8px 18px;font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:all 0.2s}
    .stab:hover{color:var(--text)}
    .stab.active{color:var(--brown);border-bottom-color:var(--brown)}

    .body{display:grid;grid-template-columns:170px 1fr;min-height:calc(100vh - 120px)}.body.full-width{grid-template-columns:1fr}
    .sidebar{background:#fff;border-right:1px solid var(--border);padding:12px 10px;overflow-y:auto}
    .sidebar.hidden{display:none}
    .sb-title{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
    .vend-item{display:flex;align-items:center;gap:6px;padding:5px 7px;border-radius:6px;cursor:pointer;font-size:11px;color:var(--text);margin-bottom:1px;transition:background 0.15s}
    .vend-item:hover{background:#faf9f8}
    .vend-item.active{background:var(--bl);color:var(--brown);font-weight:500}
    .vend-item input{accent-color:var(--brown);width:12px;height:12px;flex-shrink:0}
    .marca-sec{margin-top:14px}
    .marca-row{margin-bottom:7px}
    .marca-hdr{display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px}
    .marca-name{color:var(--muted)}
    .marca-val{color:var(--brown);font-weight:600}
    .marca-track{height:5px;background:#f0ede9;border-radius:2px}
    .marca-fill{height:100%;border-radius:2px}

    .main{padding:12px 14px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;overflow-x:hidden}
    .card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px;overflow:hidden}
    .card-title{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:flex;align-items:center;gap:5px}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .kpi{background:#faf9f8;border:1px solid var(--border);border-radius:8px;padding:10px 12px}
    .kpi-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
    .kpi-val{font-size:17px;font-weight:600;color:var(--text);margin-top:2px}
    .kpi-sub{font-size:10px;color:#3B6D11;margin-top:1px}

    .hbar{display:flex;align-items:center;gap:6px;margin-bottom:5px;cursor:pointer;border-radius:5px;padding:2px 4px;transition:background 0.15s;overflow:hidden}
    .hbar:hover{background:#faf9f8}
    .hbar-lbl{font-size:11px;color:var(--text);width:120px;min-width:120px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .hbar-track{flex:1;height:14px;background:#f0ede9;border-radius:3px;overflow:hidden;min-width:0}
    .hbar-fill{height:100%;border-radius:3px;background:#5a8fa3;transition:width 0.4s;max-width:100%}
    .hbar-fill.brown{background:var(--brown)}
    .hbar-val{font-size:11px;color:var(--muted);min-width:60px;max-width:70px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    .prod-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;overflow:hidden}
    .prod-name{font-size:11px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
    .prod-bar{width:50px;min-width:50px;height:9px;background:#f0ede9;border-radius:2px;flex-shrink:0;overflow:hidden}
    .prod-fill{height:100%;border-radius:2px;background:#7ab3c4;max-width:100%}
    .prod-qty{font-size:11px;color:var(--muted);min-width:28px;text-align:right;flex-shrink:0}

    .freq-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;overflow:hidden}
    .freq-lbl{font-size:10px;color:var(--muted);width:36px;min-width:36px;text-align:right;flex-shrink:0}
    .freq-track{flex:1;height:18px;background:#f0ede9;border-radius:3px;overflow:hidden;min-width:0}
    .freq-fill{height:100%;border-radius:3px;background:var(--brown);display:flex;align-items:center;padding-left:7px;transition:width 0.4s;min-width:0;max-width:100%}
    .freq-fill span{font-size:10px;color:#fff;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .freq-count{font-size:10px;color:var(--muted);min-width:55px;flex-shrink:0}

    .breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);flex-wrap:wrap}
    .crumb{color:var(--brown);cursor:pointer}
    .crumb:hover{text-decoration:underline}
    .cli-header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bl);border:1px solid rgba(160,104,74,0.25);border-radius:8px;overflow:hidden}
    .cli-avatar{width:36px;height:36px;border-radius:50%;background:rgba(160,104,74,0.2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--brown);flex-shrink:0}
    .cli-name{font-size:14px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .cli-sub{font-size:11px;color:var(--muted)}
    .back-btn{margin-left:auto;background:none;border:1px solid var(--brown);color:var(--brown);font-size:11px;padding:5px 12px;border-radius:20px;cursor:pointer;display:flex;align-items:center;gap:4px;flex-shrink:0}
    .back-btn:hover{background:var(--bl)}
    .loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:12px;color:var(--muted)}
    .loader i{font-size:36px;color:var(--brown);animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .coming{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:12px;color:var(--muted)}
    .coming i{font-size:48px;color:rgba(160,104,74,0.3)}


    .sort-btn{padding:4px 10px;font-size:10px;border-radius:6px;border:1px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;transition:all 0.2s}
    .sort-btn.active-sort{background:var(--brown);color:#fff;border-color:var(--brown)}
    @media(max-width:640px){
      .body{grid-template-columns:1fr}
      .sidebar{display:none}
      .kpi-row{grid-template-columns:repeat(2,1fr)}
      .row2{grid-template-columns:1fr}
      .hbar-lbl{width:90px;min-width:90px}
      .hbar-val{min-width:50px}
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-c">C</div>
    <div>
      <div class="logo-name">COSÉTIKA</div>
      <div class="logo-sl">Innovación Europea en Belleza</div>
    </div>
  </div>
  <div class="hdr-right">
    <div class="badge" id="badge-periodo">Ene–May 2026</div>
    <div class="icon-btn" title="Administración" onclick="alert('Panel admin próximamente')"><i class="ti ti-settings"></i></div>
  </div>
</div>

<div class="mods" id="mods-bar">
  <div class="mod active" id="mod-ventas" onclick="setMod('ventas')"><i class="ti ti-chart-bar"></i>Ventas</div>
  <div class="mod" id="mod-visitas" onclick="setMod('visitas')"><i class="ti ti-map-pin"></i>Visitas</div>
  <div class="mod" id="mod-kpis" onclick="setMod('kpis')"><i class="ti ti-trending-up"></i>KPIs</div>
  <div class="mod" id="mod-inventario" onclick="setMod('inventario')"><i class="ti ti-package"></i>Inventario</div>
  <div class="mod" id="mod-config" onclick="setMod('config')" style="display:none"><i class="ti ti-settings"></i>Config</div>
</div>

<div class="submenu" id="submenu-ventas">
  <div class="stab active" id="stab-cpf" onclick="setSubtab('cpf')">Clientes, Productos y Frecuencia</div>
  <div class="stab" id="stab-prov" onclick="setSubtab('prov')">Clientes por Provincia</div>
</div>

<div class="body" id="body">
  <div class="sidebar" id="sidebar">
    <div class="sb-title">Vendedor</div>
    <div id="vend-list"></div>
    <div class="marca-sec">
      <div class="sb-title" style="margin-top:4px">Marca</div>
      <div id="marcas-sb"></div>
    </div>
  </div>
  <div class="main" id="main"></div>
</div>

<script>
const MESES={1:'Ene',2:'Feb',3:'Mar',4:'Abr',5:'May',6:'Jun',7:'Jul',8:'Ago',9:'Sep',10:'Oct',11:'Nov',12:'Dic'};
const fmt=n=>'$'+Number(n).toLocaleString('es-EC',{minimumFractionDigits:2,maximumFractionDigits:2});
const pct=(v,mx)=>mx?Math.min(Math.round((v/mx)*100),100):0;
const EXCLUIR=['Fernando Espíndola','Fernando Espindola'];

let DATA={};
let vendActual=null;
let modActual='ventas';
let subtabActual='home'; // home = resumen general

function setMod(mod){
  document.querySelectorAll('.mod').forEach(m=>m.classList.remove('active'));
  document.getElementById('mod-'+mod)?.classList.add('active');
  modActual=mod;
  document.getElementById('submenu-ventas').classList.toggle('visible', mod==='ventas');
  document.getElementById('sidebar').classList.toggle('hidden', mod!=='ventas');
  document.getElementById('body').classList.toggle('full-width', mod!=='ventas');
  if(mod==='ventas'){
    renderHome();
  } else if(mod==='visitas'){
    renderModVisitas();
  } else if(mod==='config'){
    renderConfig();
  } else {
    document.getElementById('main').innerHTML=`
      <div class="coming">
        <i class="ti ti-tools"></i>
        <p>Módulo de ${mod.charAt(0).toUpperCase()+mod.slice(1)}</p>
        <span style="font-size:12px">Próximamente</span>
      </div>`;
  }
}

function renderModVisitas(){
  const tab = window._visitaTab || 'realizadas';
  document.getElementById('main').innerHTML = `
    <div style="display:flex;gap:0;background:white;border-radius:12px;border:1px solid var(--border);overflow:hidden;margin-bottom:12px">
      <button onclick="setVisitaTab('planificacion')"
        style="flex:1;padding:11px;font-size:13px;font-weight:500;border:none;cursor:pointer;transition:all 0.2s;
        background:${tab==='planificacion'?'var(--brown)':'white'};color:${tab==='planificacion'?'white':'var(--muted)'}">
        <i class="ti ti-calendar" style="margin-right:5px"></i>Planificación
      </button>
      <button onclick="setVisitaTab('realizadas')"
        style="flex:1;padding:11px;font-size:13px;font-weight:500;border:none;cursor:pointer;transition:all 0.2s;
        background:${tab==='realizadas'?'var(--brown)':'white'};color:${tab==='realizadas'?'white':'var(--muted)'}">
        <i class="ti ti-check" style="margin-right:5px"></i>Realizadas
      </button>
    </div>
    <div id="visitas-content"></div>`;
  if(tab==='realizadas') renderVisitasRealizadas();
  else renderPlanificacion();
}

function setVisitaTab(tab){
  window._visitaTab = tab;
  renderModVisitas();
}

async function renderVisitasRealizadas(){
  await cargarVisitas();
  const usuario = window.usuarioActual || {};
  const rol = usuario.rol || '';
  const nombre = usuario.nombre || '';
  if(rol==='asesora') asesoraVisitas = nombre;
  const asesoraActual2 = asesoraVisitas || Object.keys(ASESOR_DATA)[0];
  const data = ASESOR_DATA[asesoraActual2];
  if(!data){ document.getElementById('visitas-content').innerHTML='<p style="color:var(--muted);font-size:13px;padding:20px">No hay sectores asignados</p>'; return; }
  const todosLugares=[...Object.values(data.zonas).flat(),...data.provincias];
  const urgentes=todosLugares.filter(l=>{const t=data.provincias.includes(l)?'provincia':'sector';return estadoLugar(l,t)==='warn'||estadoLugar(l,t)==='none';});
  let asesBtns='';
  if(rol==='admin'||rol==='jefa_ventas'){
    asesBtns=`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">${Object.keys(ASESOR_DATA).map(a=>`<button onclick="selAsesoraVisitas('${a.replace(/'/g,"\'")}',this)" style="padding:5px 12px;font-size:11px;border-radius:20px;cursor:pointer;border:0.5px solid ${a===asesoraActual2?'var(--brown)':'var(--border)'};background:${a===asesoraActual2?'var(--brown)':'white'};color:${a===asesoraActual2?'white':'var(--muted)'}">${a.split(' ')[0]}</button>`).join('')}</div>`;
  }
  let sectoresHtml='';
  Object.entries(data.zonas).forEach(([zona,sectores])=>{
    sectoresHtml+=`<div style="font-size:11px;font-weight:500;color:var(--text);margin:12px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border)">${zona}</div><div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px">`;
    sectores.forEach(s=>{
      const st=estadoLugar(s,'sector');
      const colors={fresh:'background:#dcfce7;color:#166534;border-color:#86efac',ok:'background:#fef9c3;color:#854d0e;border-color:#fde047',warn:'background:#fee2e2;color:#991b1b;border-color:#fca5a5',none:'background:#f3f4f6;color:#6b7280;border-color:#d1d5db'};
      sectoresHtml+=`<button onclick="abrirModalVisita('${s.replace(/'/g,"\'")}','sector','${asesoraActual2.replace(/'/g,"\'")}',this)" style="padding:6px 12px;font-size:11px;border-radius:20px;border:0.5px solid;cursor:pointer;${colors[st]}" title="${diasLabel(s)}">${s}</button>`;
    });
    sectoresHtml+='</div>';
  });
  let provsHtml='<div style="display:flex;flex-wrap:wrap;gap:8px">';
  data.provincias.forEach(p=>{
    const st=estadoLugar(p,'provincia');
    const colors={fresh:'background:#dcfce7;color:#166534;border-color:#86efac',ok:'background:#fef9c3;color:#854d0e;border-color:#fde047',warn:'background:#fee2e2;color:#991b1b;border-color:#fca5a5',none:'background:#f3f4f6;color:#6b7280;border-color:#d1d5db'};
    provsHtml+=`<button onclick="abrirModalVisita('${p}','provincia','${asesoraActual2.replace(/'/g,"\'")}',this)" style="padding:8px 16px;font-size:12px;border-radius:10px;border:0.5px solid;cursor:pointer;display:flex;align-items:center;gap:6px;${colors[st]}"><i class="ti ti-map-pin"></i>${p}<span style="font-size:10px;opacity:0.7">${diasLabel(p)}</span></button>`;
  });
  provsHtml+='</div>';
  const recientes=[...visitasDB].filter(v=>rol==='asesora'?v.asesora===nombre:true).sort((a,b)=>new Date(b.fecha)-new Date(a.fecha)).slice(0,8);
  const histHtml=recientes.length?recientes.map(v=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--border);font-size:12px"><i class="ti ti-${v.tipo==='provincia'?'world':'map-pin'}" style="color:#A0684A;font-size:14px;flex-shrink:0"></i><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${v.lugar}</span><span style="font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(160,104,74,0.12);color:#A0684A">${v.asesora.split(' ')[0]}</span><span style="color:var(--muted);font-size:11px;min-width:65px;text-align:right">${fmtFecha(v.fecha)}</span></div>`).join(''):'<p style="font-size:12px;color:var(--muted)">Sin visitas registradas</p>';
  document.getElementById('visitas-content').innerHTML=`
    ${asesBtns}
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)"><div style="width:10px;height:10px;border-radius:50%;background:#4ade80"></div>Reciente</div>
      <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)"><div style="width:10px;height:10px;border-radius:50%;background:#facc15"></div>Próximo a vencer</div>
      <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)"><div style="width:10px;height:10px;border-radius:50%;background:#f87171"></div>Urgente</div>
      <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)"><div style="width:10px;height:10px;border-radius:50%;background:#d1d5db"></div>Sin visita</div>
    </div>
    <div class="kpi-row" style="margin-bottom:12px">
      <div class="kpi"><div class="kpi-label">Sectores</div><div class="kpi-val">${Object.values(data.zonas).flat().length}</div><div class="kpi-sub">asignados</div></div>
      <div class="kpi"><div class="kpi-label">Provincias</div><div class="kpi-val">${data.provincias.length}</div><div class="kpi-sub">asignadas</div></div>
      <div class="kpi"><div class="kpi-label">Visitas</div><div class="kpi-val">${visitasDB.filter(v=>v.asesora===asesoraActual2).length}</div><div class="kpi-sub">registradas</div></div>
      <div class="kpi"><div class="kpi-label">Pendientes</div><div class="kpi-val" style="color:#991b1b">${urgentes.length}</div><div class="kpi-sub" style="color:#991b1b">sin visitar</div></div>
    </div>
    <div class="row2" style="align-items:start">
      <div class="card"><div class="card-title"><i class="ti ti-map"></i> Sectores</div>${sectoresHtml}</div>
      <div style="display:flex;flex-direction:column;gap:12px">
        <div class="card"><div class="card-title"><i class="ti ti-world"></i> Provincias</div>${provsHtml}</div>
        <div class="card"><div class="card-title"><i class="ti ti-history"></i> Historial reciente</div>${histHtml}</div>
      </div>
    </div>
    <div id="modal-visita" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center;padding:20px">
      <div style="background:white;border-radius:12px;width:100%;max-width:400px;max-height:80vh;overflow-y:auto">
        <div style="padding:14px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between">
          <div id="mv-title" style="font-size:14px;font-weight:500"></div>
          <button onclick="cerrarModalVisita()" style="background:none;border:none;cursor:pointer;font-size:18px;color:var(--muted)"><i class="ti ti-x"></i></button>
        </div>
        <div id="mv-body" style="padding:16px"></div>
      </div>
    </div>`;
  document.getElementById('modal-visita').addEventListener('click',function(e){if(e.target===this)cerrarModalVisita();});
}


// ── Utilidades de semana ──────────────────────────────────────
function getWeekDates(offset=0){
  const now = new Date();
  const day = now.getDay(); // 0=Dom
  const monday = new Date(now);
  monday.setDate(now.getDate() - (day===0?6:day-1) + offset*7);
  const dates = [];
  for(let i=0;i<6;i++){
    const d = new Date(monday);
    d.setDate(monday.getDate()+i);
    dates.push(d);
  }
  return dates;
}

function weekLabel(offset=0){
  const dates = getWeekDates(offset);
  const opts = {day:'2-digit',month:'short'};
  return `${dates[0].toLocaleDateString('es-EC',opts)} – ${dates[5].toLocaleDateString('es-EC',opts)}`;
}

function isoDate(d){ return d.toISOString().split('T')[0]; }

function getDayName(d){
  return ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'][d.getDay()];
}

// ── Planificación ─────────────────────────────────────────────
let planWeekOffset = 0;
let planRows = [];

async function renderPlanificacion(){
  const usuario = window.usuarioActual || {};
  const asesora = usuario.nombre || '';
  const rol = usuario.rol || '';
  const weekDates = getWeekDates(planWeekOffset);

function renderPlanRow(row, i, weekDayNames){
  const dayOpts = ['',
    ...(weekDayNames||['Lun','Mar','Mié','Jue','Vie','Sáb'])
  ].map(d=>`<option value="${d}" ${row.dia===d?'selected':''}>${d||'-- Día --'}</option>`).join('');
  
  return `<tr style="border-bottom:0.5px solid var(--border)" id="plan-row-${i}">
    <td style="padding:5px 8px">
      <select onchange="planRows[${i}].dia=this.value" style="width:100%;padding:5px 6px;border:0.5px solid var(--border);border-radius:5px;font-size:12px;outline:none;background:white">
        ${dayOpts}
      </select>
    </td>
    <td style="padding:5px 8px">
      <input type="text" value="${row.sector||''}" onchange="planRows[${i}].sector=this.value" placeholder="Ej: La Carolina"
        style="width:100%;padding:5px 8px;border:0.5px solid var(--border);border-radius:5px;font-size:12px;outline:none"/>
    </td>
    <td style="padding:5px 8px">
      <input type="text" value="${row.cliente||''}" onchange="planRows[${i}].cliente=this.value" placeholder="Nombre del cliente"
        style="width:100%;padding:5px 8px;border:0.5px solid var(--border);border-radius:5px;font-size:12px;outline:none"/>
    </td>
    <td style="padding:5px 8px;text-align:center">
      <input type="checkbox" ${row.coordinado?'checked':''} onchange="planRows[${i}].coordinado=this.checked"
        style="accent-color:#A0684A;width:16px;height:16px;cursor:pointer"/>
    </td>
    <td style="padding:5px 4px;text-align:center">
      <button onclick="eliminarFilaPlan(${i})" style="background:none;border:none;cursor:pointer;color:#ccc;font-size:14px;padding:2px 4px" title="Eliminar">×</button>
    </td>
  </tr>`;
}

function agregarFilaPlan(){
  const weekDates = getWeekDates(planWeekOffset);
  const weekDayNames = weekDates.map(d=>`${getDayName(d)} ${d.getDate()}`);
  planRows.push({dia:'',sector:'',cliente:'',coordinado:false});
  const tbody = document.getElementById('plan-tbody');
  if(tbody){
    const i = planRows.length-1;
    const tr = document.createElement('tr');
    tr.style.borderBottom = '0.5px solid var(--border)';
    tr.id = 'plan-row-'+i;
    tr.innerHTML = renderPlanRow(planRows[i], i, weekDayNames).replace(/^<tr[^>]*>/,'').replace(/<\/tr>$/,'');
    tbody.appendChild(tr);
  }
}

function eliminarFilaPlan(i){
  planRows.splice(i,1);
  const weekDates = getWeekDates(planWeekOffset);
  const weekDayNames = weekDates.map(d=>`${getDayName(d)} ${d.getDate()}`);
  const tbody = document.getElementById('plan-tbody');
  if(tbody) tbody.innerHTML = planRows.map((row,idx)=>renderPlanRow(row,idx,weekDayNames)).join('');
}

async function planAsesoraChange(asesora){
  const weekDates = getWeekDates(planWeekOffset);
  const semanaKey = isoDate(weekDates[0]);
  try {
    const r = await fetch(`/api/planificacion?asesora=${encodeURIComponent(asesora)}&semana=${semanaKey}`);
    const saved = await r.json();
    const weekDayNames = weekDates.map(d=>`${getDayName(d)} ${d.getDate()}`);
    planRows = saved.length>0 ? saved.map(r=>({dia:r.dia,sector:r.sector,cliente:r.cliente,coordinado:r.coordinado}))
      : Array.from({length:20},()=>({dia:'',sector:'',cliente:'',coordinado:false}));
    const tbody = document.getElementById('plan-tbody');
    if(tbody) tbody.innerHTML = planRows.map((row,i)=>renderPlanRow(row,i,weekDayNames)).join('');
  } catch(e){}
}

async function guardarPlanificacion(asesora, semanaKey){
  // Leer valores actuales del DOM
  const rows = planRows.map((row,i)=>{
    const tr = document.getElementById('plan-row-'+i);
    if(tr){
      const sel = tr.querySelector('select');
      const inputs = tr.querySelectorAll('input[type="text"]');
      const chk = tr.querySelector('input[type="checkbox"]');
      return {
        dia: sel ? sel.value : row.dia,
        sector: inputs[0] ? inputs[0].value : row.sector,
        cliente: inputs[1] ? inputs[1].value : row.cliente,
        coordinado: chk ? chk.checked : row.coordinado
      };
    }
    return row;
  }).filter(r=>r.dia||r.sector||r.cliente);

  if(rows.length===0){ alert('No hay datos para guardar'); return; }

  // Si admin/jefa, usar asesora del selector
  const sel = document.getElementById('plan-asesora-sel');
  const asesoraFinal = sel ? sel.value : asesora;

  try {
    const r = await fetch('/api/planificacion', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ asesora: asesoraFinal, semana: semanaKey, filas: rows })
    });
    const data = await r.json();
    if(data.ok) alert(`✓ Planificación guardada — ${rows.length} filas`);
    else alert('Error: '+data.error);
  } catch(e){ alert('Error de conexión'); }
}

  const vendedoras=Object.keys(DATA);
  const totalGlobal=vendedoras.reduce((a,v)=>a+DATA[v].reduce((b,c)=>b+c.total,0),0);
  const totalClientes=vendedoras.reduce((a,v)=>a+DATA[v].length,0);

const DIAS_SECTOR = 30;
const DIAS_PROV = 60;
let visitasDB = [];
let asesoraVisitas = null;

async function cargarVisitas(){
  try {
    const r = await fetch('/api/visitas');
    visitasDB = await r.json();
  } catch(e) { visitasDB = []; }
}

function diasDesde(fechaStr){
  if(!fechaStr) return 9999;
  return Math.floor((Date.now() - new Date(fechaStr)) / 86400000);
}

function ultimaVisita(lugar){
  const v = visitasDB.filter(x=>x.lugar===lugar).sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
  return v[0]?.fecha || null;
}

function estadoLugar(lugar, tipo){
  const limite = tipo==='provincia' ? DIAS_PROV : DIAS_SECTOR;
  const d = diasDesde(ultimaVisita(lugar));
  if(d===9999) return 'none';
  if(d < limite*0.5) return 'fresh';
  if(d < limite) return 'ok';
  return 'warn';
}

function fmtFecha(f){
  if(!f) return '—';
  return new Date(f).toLocaleDateString('es-EC',{day:'2-digit',month:'short',year:'2-digit'});
}

function diasLabel(lugar){
  const d = diasDesde(ultimaVisita(lugar));
  if(d===9999) return 'Sin visita';
  if(d===0) return 'Hoy';
  return `Hace ${d}d`;
}

async function renderVisitas(){
  await cargarVisitas();
  const asesoraActual = asesoraVisitas || Object.keys(ASESOR_DATA)[0];
  const data = ASESOR_DATA[asesoraActual];
  const todosLugares = [...Object.values(data.zonas).flat(), ...data.provincias];
  const urgentes = todosLugares.filter(l=>{
    const tipo = data.provincias.includes(l)?'provincia':'sector';
    return estadoLugar(l,tipo)==='warn' || estadoLugar(l,tipo)==='none';
  });

  const asesBtns = Object.keys(ASESOR_DATA).map(a=>`
    <button onclick="selAsesoraVisitas('${a.replace(/'/g,"\'")}',this)"
      style="padding:5px 12px;font-size:11px;border-radius:20px;cursor:pointer;transition:all 0.2s;
      border:0.5px solid ${a===asesoraActual?'var(--brown)':'var(--border)'};
      background:${a===asesoraActual?'var(--brown)':'white'};
      color:${a===asesoraActual?'white':'var(--muted)'}"
      class="ases-v-btn">${a.split(' ')[0]}</button>`).join('');

  let sectoresHtml = '';
  Object.entries(data.zonas).forEach(([zona, sectores])=>{
    sectoresHtml += `<div style="font-size:11px;font-weight:500;color:var(--text);margin:12px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border)">${zona}</div>`;
    sectoresHtml += `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px">`;
    sectores.forEach(s=>{
      const st = estadoLugar(s,'sector');
      const colors = {fresh:'background:#dcfce7;color:#166534;border-color:#86efac',ok:'background:#fef9c3;color:#854d0e;border-color:#fde047',warn:'background:#fee2e2;color:#991b1b;border-color:#fca5a5',none:'background:#f3f4f6;color:#6b7280;border-color:#d1d5db'};
      sectoresHtml += `<button onclick="abrirModalVisita('${s.replace(/'/g,"\'")}','sector','${asesoraActual.replace(/'/g,"\'")}',this)"
        style="padding:6px 12px;font-size:11px;border-radius:20px;border:0.5px solid;cursor:pointer;${colors[st]}"
        title="${diasLabel(s)}">${s}</button>`;
    });
    sectoresHtml += '</div>';
  });

  let provsHtml = '<div style="display:flex;flex-wrap:wrap;gap:8px">';
  data.provincias.forEach(p=>{
    const st = estadoLugar(p,'provincia');
    const colors = {fresh:'background:#dcfce7;color:#166534;border-color:#86efac',ok:'background:#fef9c3;color:#854d0e;border-color:#fde047',warn:'background:#fee2e2;color:#991b1b;border-color:#fca5a5',none:'background:#f3f4f6;color:#6b7280;border-color:#d1d5db'};
    provsHtml += `<button onclick="abrirModalVisita('${p}','provincia','${asesoraActual.replace(/'/g,"\'")}',this)"
      style="padding:8px 16px;font-size:12px;border-radius:10px;border:0.5px solid;cursor:pointer;display:flex;align-items:center;gap:6px;${colors[st]}">
      <i class="ti ti-map-pin" aria-hidden="true"></i>${p}
      <span style="font-size:10px;opacity:0.7">${diasLabel(p)}</span>
    </button>`;
  });
  provsHtml += '</div>';

  const recientes = [...visitasDB].sort((a,b)=>new Date(b.fecha)-new Date(a.fecha)).slice(0,10);
  const histHtml = recientes.length ? recientes.map(v=>`
    <div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--border);font-size:12px">
      <i class="ti ti-${v.tipo==='provincia'?'world':'map-pin'}" aria-hidden="true" style="color:#A0684A;font-size:14px;flex-shrink:0"></i>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${v.lugar}</span>
      <span style="font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(160,104,74,0.12);color:#A0684A">${v.asesora.split(' ')[0]}</span>
      <span style="color:var(--muted);font-size:11px;min-width:65px;text-align:right">${fmtFecha(v.fecha)}</span>
    </div>`).join('') : '<p style="font-size:12px;color:var(--muted)">Sin visitas registradas</p>';

  document.getElementById('main').innerHTML = `
    <div class="breadcrumb"><i class="ti ti-map-pin" style="font-size:12px;color:#A0684A" aria-hidden="true"></i><span style="font-weight:500">Módulo de visitas</span></div>

    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:4px">
      <div style="display:flex;gap:6px;flex-wrap:wrap">${asesBtns}</div>
    </div>

    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px">
      <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)"><div style="width:10px;height:10px;border-radius:50%;background:#4ade80"></div>Reciente</div>
      <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)"><div style="width:10px;height:10px;border-radius:50%;background:#facc15"></div>Próximo a vencer</div>
      <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)"><div style="width:10px;height:10px;border-radius:50%;background:#f87171"></div>Urgente</div>
      <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)"><div style="width:10px;height:10px;border-radius:50%;background:#d1d5db"></div>Sin visita</div>
    </div>

    <div class="kpi-row">
      <div class="kpi"><div class="kpi-label">Sectores</div><div class="kpi-val">${Object.values(data.zonas).flat().length}</div><div class="kpi-sub">asignados</div></div>
      <div class="kpi"><div class="kpi-label">Provincias</div><div class="kpi-val">${data.provincias.length}</div><div class="kpi-sub">asignadas</div></div>
      <div class="kpi"><div class="kpi-label">Total visitas</div><div class="kpi-val">${visitasDB.filter(v=>v.asesora===asesoraActual).length}</div><div class="kpi-sub">registradas</div></div>
      <div class="kpi"><div class="kpi-label">Requieren visita</div><div class="kpi-val" style="color:#991b1b">${urgentes.length}</div><div class="kpi-sub" style="color:#991b1b">urgente o sin visita</div></div>
    </div>

    <div class="row2" style="align-items:start">
      <div class="card">
        <div class="card-title"><i class="ti ti-map" aria-hidden="true"></i> Sectores — haz clic para registrar visita</div>
        ${sectoresHtml}
      </div>
      <div style="display:flex;flex-direction:column;gap:12px">
        <div class="card">
          <div class="card-title"><i class="ti ti-world" aria-hidden="true"></i> Provincias asignadas</div>
          ${provsHtml}
        </div>
        <div class="card">
          <div class="card-title"><i class="ti ti-history" aria-hidden="true"></i> Historial de visitas</div>
          ${histHtml}
        </div>
      </div>
    </div>

    <div id="modal-visita" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center;padding:20px">
      <div style="background:white;border-radius:12px;border:0.5px solid var(--border);width:100%;max-width:400px;max-height:80vh;overflow-y:auto">
        <div style="padding:14px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between">
          <div id="mv-title" style="font-size:14px;font-weight:500;color:var(--text)"></div>
          <button onclick="cerrarModalVisita()" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px"><i class="ti ti-x" aria-hidden="true"></i></button>
        </div>
        <div id="mv-body" style="padding:16px"></div>
      </div>
    </div>`;

  document.getElementById('modal-visita').addEventListener('click', function(e){
    if(e.target===this) cerrarModalVisita();
  });
}

function selAsesoraVisitas(nombre, el){
  asesoraVisitas = nombre;
  renderVisitas();
}

function cerrarModalVisita(){
  const m = document.getElementById('modal-visita');
  if(m) m.style.display='none';
}

async function abrirModalVisita(lugar, tipo, asesora){
  const visLugar = visitasDB.filter(v=>v.lugar===lugar).sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
  const ult = visLugar[0];
  const dias = diasDesde(ult?.fecha);
  const limite = tipo==='provincia'?DIAS_PROV:DIAS_SECTOR;

  document.getElementById('mv-title').innerHTML = `<i class="ti ti-${tipo==='provincia'?'world':'map-pin'}" aria-hidden="true" style="color:#A0684A"></i> ${lugar}`;
  document.getElementById('mv-body').innerHTML = `
    <div style="display:flex;gap:10px;margin-bottom:14px">
      <div style="flex:1;background:#faf9f8;border-radius:8px;padding:10px;text-align:center">
        <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">Última visita</div>
        <div style="font-size:14px;font-weight:500;margin-top:4px">${ult?fmtFecha(ult.fecha):'—'}</div>
      </div>
      <div style="flex:1;background:#faf9f8;border-radius:8px;padding:10px;text-align:center">
        <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">Días transcurridos</div>
        <div style="font-size:14px;font-weight:500;color:${dias>=limite?'#991b1b':'#166534'};margin-top:4px">${dias===9999?'—':dias+'d'}</div>
      </div>
    </div>
    ${visLugar.length?`
      <div style="font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Historial</div>
      ${visLugar.slice(0,5).map(v=>`
        <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--border);font-size:12px">
          <span style="flex:1">${v.asesora.split(' ')[0]}</span>
          <span style="color:var(--muted)">${fmtFecha(v.fecha)}</span>
        </div>`).join('')}`:'<p style="font-size:12px;color:var(--muted);margin-bottom:12px">Sin visitas previas</p>'}
    <button onclick="marcarVisitaDB('${lugar.replace(/'/g,"\'")}','${tipo}','${asesora.replace(/'/g,"\'")}',this)"
      style="background:#A0684A;color:white;border:none;padding:10px 16px;border-radius:8px;font-size:13px;cursor:pointer;width:100%;margin-top:14px">
      <i class="ti ti-check" aria-hidden="true"></i> Marcar como visitado hoy
    </button>`;

  document.getElementById('modal-visita').style.display='flex';
}

async function marcarVisitaDB(lugar, tipo, asesora, btn){
  btn.disabled=true;
  btn.textContent='Guardando...';
  try {
    await fetch('/api/visitas', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({lugar, tipo, asesora})
    });
    cerrarModalVisita();
    await renderVisitas();
  } catch(e) {
    btn.disabled=false;
    btn.textContent='Error — intenta de nuevo';
  }
}

// ─── AUTH ───────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  const usuarioActual = JSON.parse(sessionStorage.getItem('cosetika_usuario') || 'null');
  if (!usuarioActual) { window.location.href = '/login'; return; }
  
  // Saludo
  const nombre = usuarioActual.nombre.split(' ')[0];
  const badge = document.getElementById('badge-periodo');
  if (badge) badge.innerHTML = `Hola, ${nombre} &nbsp;·&nbsp; Ene–May 2026`;

  // Botón settings
  const settingsBtn = document.querySelector('.icon-btn');
  if (settingsBtn) {
    if (usuarioActual.rol === 'admin') {
      settingsBtn.title = 'Configuración';
      settingsBtn.onclick = () => setMod('config');
    } else {
      settingsBtn.title = 'Cerrar sesión';
      settingsBtn.onclick = () => { if(confirm('¿Cerrar sesión?')){ sessionStorage.clear(); window.location.href='/login'; }};
    }
  }

  // Mostrar módulos según permisos
  const modulos = usuarioActual.modulos ? usuarioActual.modulos.split(',') : [];
  document.querySelectorAll('.mod').forEach(m => {
    const id = m.id.replace('mod-', '');
    if (id === 'config') {
      m.style.display = usuarioActual.rol === 'admin' ? 'flex' : 'none';
    } else if (id && !modulos.includes(id)) {
      m.style.display = 'none';
    }
  });

  // Guardar usuario globalmente
  window.usuarioActual = usuarioActual;
  cargarData();
});
</script>
</body>
</html>
