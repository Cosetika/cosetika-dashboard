<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cosétika — Asistente de Belleza</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--brown:#A0684A;--brown-dark:#1a0e08;--bl:rgba(160,104,74,0.12)}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f1ee;min-height:100vh;display:flex;flex-direction:column}

    .header{background:var(--brown-dark);padding:14px 20px;display:flex;align-items:center;gap:12px;border-bottom:2px solid var(--brown)}
    .logo-c{width:40px;height:40px;background:var(--brown);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:700;color:#fff;font-style:italic;font-family:Georgia,serif;flex-shrink:0}
    .logo-text .name{font-size:16px;font-weight:500;letter-spacing:2px;color:#fff}
    .logo-text .slogan{font-size:9px;color:#fff;letter-spacing:1px}
    .header-badge{margin-left:auto;background:rgba(160,104,74,0.3);border:1px solid var(--brown);color:#c9a07a;font-size:11px;padding:3px 10px;border-radius:20px}

    .chat-wrap{flex:1;display:flex;flex-direction:column;max-width:700px;width:100%;margin:0 auto;padding:16px;gap:12px}

    .welcome{background:white;border-radius:16px;padding:20px;border:1px solid rgba(0,0,0,0.08);text-align:center}
    .welcome-icon{font-size:48px;margin-bottom:12px}
    .welcome h2{font-size:18px;font-weight:500;color:#1a1a1a;margin-bottom:6px}
    .welcome p{font-size:13px;color:#6b6b6b;line-height:1.6;margin-bottom:16px}
    .suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
    .sugg-btn{background:var(--bl);border:1px solid rgba(160,104,74,0.3);color:var(--brown);font-size:12px;padding:7px 14px;border-radius:20px;cursor:pointer;transition:all 0.2s}
    .sugg-btn:hover{background:var(--brown);color:#fff}

    .messages{display:flex;flex-direction:column;gap:12px;flex:1}

    .msg{display:flex;gap:10px;align-items:flex-start}
    .msg.user{flex-direction:row-reverse}
    .msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
    .msg.bot .msg-avatar{background:var(--brown);color:#fff;font-style:italic;font-family:Georgia,serif}
    .msg.user .msg-avatar{background:#e2e8f0;color:#475569;font-size:16px}
    .msg-bubble{max-width:85%;padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.6}
    .msg.bot .msg-bubble{background:white;border:1px solid rgba(0,0,0,0.08);color:#1a1a1a;border-radius:4px 16px 16px 16px}
    .msg.user .msg-bubble{background:var(--brown);color:#fff;border-radius:16px 4px 16px 16px}

    .typing{display:flex;gap:4px;align-items:center;padding:14px 16px}
    .typing span{width:7px;height:7px;background:#A0684A;border-radius:50%;animation:bounce 1.2s infinite}
    .typing span:nth-child(2){animation-delay:0.2s}
    .typing span:nth-child(3){animation-delay:0.4s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}

    .input-area{background:white;border-radius:16px;border:1px solid rgba(0,0,0,0.08);padding:12px;display:flex;gap:8px;align-items:flex-end}
    .input-text{flex:1;border:none;outline:none;font-size:14px;font-family:inherit;resize:none;max-height:120px;color:#1a1a1a;line-height:1.5;background:transparent}
    .input-text::placeholder{color:#9ca3af}
    .btn-voz{width:40px;height:40px;border-radius:50%;border:1px solid rgba(160,104,74,0.3);background:var(--bl);color:var(--brown);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all 0.2s;flex-shrink:0}
    .btn-voz:hover{background:var(--brown);color:#fff}
    .btn-voz.recording{background:#ef4444;color:#fff;border-color:#ef4444;animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
    .btn-send{width:40px;height:40px;border-radius:50%;border:none;background:var(--brown);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all 0.2s;flex-shrink:0}
    .btn-send:hover{background:#8a5840}
    .btn-send:disabled{background:#d1c4bc;cursor:not-allowed}

    .audio-player{margin-top:8px}
    .audio-player audio{width:100%;height:32px;accent-color:var(--brown)}

    @media(max-width:500px){
      .chat-wrap{padding:10px}
      .msg-bubble{font-size:13px}
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo-c">C</div>
  <div class="logo-text">
    <div class="name">COSÉTIKA</div>
    <div class="slogan">Innovación Europea en Belleza</div>
  </div>
  <div class="header-badge">✨ Asistente de Belleza</div>
</div>

<div class="chat-wrap">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">💆‍♀️</div>
    <h2>Hola, soy tu asistente de belleza</h2>
    <p>Puedo ayudarte a encontrar el producto perfecto para tu tipo de piel, resolver dudas sobre nuestras marcas y recomendarte rutinas de cuidado.</p>
    <div class="suggestions">
      <button class="sugg-btn" onclick="sugerir(this)">¿Qué productos tienen para piel grasa?</button>
      <button class="sugg-btn" onclick="sugerir(this)">¿Cuál es la diferencia entre ZIAJA y BIOSKIN?</button>
      <button class="sugg-btn" onclick="sugerir(this)">Necesito una rutina anti-edad</button>
      <button class="sugg-btn" onclick="sugerir(this)">¿Dónde puedo comprar sus productos?</button>
      <button class="sugg-btn" onclick="sugerir(this)">¿Qué es ZIAJA PRO?</button>
      <button class="sugg-btn" onclick="sugerir(this)">Productos para manchas en la piel</button>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <textarea class="input-text" id="input" placeholder="Escribe tu pregunta..." rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();enviar()}"
      oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
    <button class="btn-voz" id="btn-voz" onclick="toggleVoz()" title="Hablar">🎤</button>
    <button class="btn-send" id="btn-send" onclick="enviar()" title="Enviar">➤</button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `Eres la asistente virtual de Cosétika, una empresa ecuatoriana especializada en cosmética europea de alta calidad con sede en Quito, Ecuador. Tu nombre es "Sofía" y eres amable, profesional y apasionada por la belleza y el cuidado de la piel.

MARCAS QUE REPRESENTA COSÉTIKA:

1. ZIAJA (Polonia)
- Marca más accesible y completa del portafolio
- Especializada en cuidado facial y corporal
- Líneas principales: Niacinamida, Vitamina C, Manuka Tree, Acai Berry, Coconut, Colágeno
- Ideal para: todo tipo de piel, uso diario, precio accesible
- Productos estrella: Espuma Facial Limpiadora 150ml, Crema Dermocalmante Antirojejes, Gel Facial Exfoliante Acai Berry

2. ZIAJA PRO (Polonia)
- Línea profesional de ZIAJA para uso en spa y estética
- Mayor concentración de principios activos
- Ideal para: tratamientos profesionales, resultados intensivos
- Diferencia con ZIAJA: formulaciones más potentes, uso profesional

3. BIOSKIN - Dermolife Cosmetic (España)
- Cosmética dermatológica avanzada
- Especializada en ampollas y serums de alta concentración
- Líneas: BSK FirmPro, BSK Porn-Pro
- Ideal para: pieles con necesidades específicas, tratamientos intensivos, antiedad
- Productos estrella: Ampollas BSK2 FirmPro 10ml, Ampollas BSK6

4. ERAYBA (España)
- Especializada en cuidado capilar profesional
- Líneas de tratamiento para cabello dañado, hidratación y color
- Ideal para: peluquerías profesionales, tratamiento capilar en casa

INFORMACIÓN DE COSÉTIKA:
- Web: www.cosetika.com
- País: Ecuador
- Especialidad: Cosmética europea de alta calidad
- Ventas: A través de distribuidoras, estéticas y tiendas especializadas en Ecuador
- Asesoras comerciales disponibles para asesoría personalizada

TIPOS DE PIEL Y RECOMENDACIONES:
- Piel grasa: ZIAJA Niacinamida, Gel limpiador Acai Berry
- Piel seca: ZIAJA Coconut, Manuka Tree crema hidratante
- Piel mixta: ZIAJA Niacinamida, Vitamina C
- Piel sensible: ZIAJA Dermocalmante Antirojejes
- Piel madura/antiedad: BIOSKIN ampollas, ZIAJA Colágeno
- Con manchas: ZIAJA Vitamina C, NIACINAMIDA

INSTRUCCIONES:
- Responde SIEMPRE en español
- Sé cálida, amable y profesional
- Cuando no sepas algo específico, recomienda contactar a una asesora de Cosétika
- No inventes precios específicos, di que varían según el punto de venta
- Limita tus respuestas a máximo 3 párrafos
- Usa emojis con moderación para hacer la conversación más amena
- Si preguntan por contacto, menciona www.cosetika.com`;

let historial = [];
let grabando = false;
let mediaRecorder = null;
let audioChunks = [];

function sugerir(btn) {
  document.getElementById('input').value = btn.textContent;
  document.getElementById('welcome').style.display = 'none';
  enviar();
}

async function enviar() {
  const input = document.getElementById('input');
  const texto = input.value.trim();
  if (!texto) return;

  document.getElementById('welcome').style.display = 'none';
  input.value = '';
  input.style.height = 'auto';

  agregarMensaje('user', texto);
  historial.push({ role: 'user', content: texto });

  mostrarTyping();
  document.getElementById('btn-send').disabled = true;

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: historial, system: SYSTEM_PROMPT })
    });
    const data = await res.json();
    ocultarTyping();

    if (data.error) throw new Error(data.error);

    const respuesta = data.content[0].text;
    historial.push({ role: 'assistant', content: respuesta });
    await agregarMensajeBot(respuesta);
  } catch(e) {
    ocultarTyping();
    agregarMensaje('bot', '¡Ups! Hubo un problema. Por favor intenta de nuevo. 😊');
  }

  document.getElementById('btn-send').disabled = false;
  input.focus();
}

function agregarMensaje(rol, texto) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${rol}`;
  const avatar = rol === 'bot' ? 'S' : '👤';
  div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div class="msg-bubble">${texto.replace(/\n/g,'<br>')}</div>`;
  msgs.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
  return div;
}

async function agregarMensajeBot(texto) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = `
    <div class="msg-avatar">S</div>
    <div>
      <div class="msg-bubble">${texto.replace(/\n/g,'<br>')}</div>
      <div class="audio-player" id="audio-${Date.now()}"></div>
    </div>`;
  msgs.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });

  // Generar audio con Web Speech API
  try {
    const audioContainer = div.querySelector('.audio-player');
    const btn = document.createElement('button');
    btn.style.cssText = 'margin-top:6px;padding:4px 12px;font-size:11px;border-radius:20px;border:1px solid rgba(160,104,74,0.3);background:rgba(160,104,74,0.1);color:#A0684A;cursor:pointer';
    btn.textContent = '🔊 Escuchar respuesta';
    btn.onclick = () => leerEnVoz(texto, btn);
    audioContainer.appendChild(btn);
  } catch(e) {}
}

function leerEnVoz(texto, btn) {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(texto);
    utt.lang = 'es-ES';
    utt.rate = 0.95;
    utt.pitch = 1.1;
    const voces = window.speechSynthesis.getVoices();
    const vozES = voces.find(v => v.lang.startsWith('es') && v.name.toLowerCase().includes('female'))
      || voces.find(v => v.lang.startsWith('es'));
    if (vozES) utt.voice = vozES;
    btn.textContent = '⏸ Pausar';
    utt.onend = () => btn.textContent = '🔊 Escuchar respuesta';
    btn.onclick = () => { window.speechSynthesis.cancel(); btn.textContent = '🔊 Escuchar respuesta'; btn.onclick = () => leerEnVoz(texto, btn); };
    window.speechSynthesis.speak(utt);
  }
}

function mostrarTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing';
  div.innerHTML = `<div class="msg-avatar">S</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function ocultarTyping() {
  document.getElementById('typing')?.remove();
}

async function toggleVoz() {
  if (grabando) {
    mediaRecorder?.stop();
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      grabando = false;
      document.getElementById('btn-voz').className = 'btn-voz';
      document.getElementById('btn-voz').textContent = '🎤';

      // Usar Web Speech API para transcribir
      const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
      recognition.lang = 'es-ES';
      recognition.onresult = e => {
        document.getElementById('input').value = e.results[0][0].transcript;
        enviar();
      };
      recognition.onerror = () => {
        document.getElementById('input').placeholder = 'No se pudo transcribir, escribe tu pregunta';
      };
    };
    mediaRecorder.start();
    grabando = true;
    document.getElementById('btn-voz').className = 'btn-voz recording';
    document.getElementById('btn-voz').textContent = '⏹';
  } catch(e) {
    // Fallback a SpeechRecognition directo
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert('Tu navegador no soporta reconocimiento de voz'); return; }
    const recognition = new SR();
    recognition.lang = 'es-ES';
    recognition.continuous = false;
    recognition.interimResults = false;
    document.getElementById('btn-voz').className = 'btn-voz recording';
    document.getElementById('btn-voz').textContent = '⏹';
    recognition.onresult = e => {
      document.getElementById('input').value = e.results[0][0].transcript;
      document.getElementById('btn-voz').className = 'btn-voz';
      document.getElementById('btn-voz').textContent = '🎤';
      enviar();
    };
    recognition.onend = () => {
      document.getElementById('btn-voz').className = 'btn-voz';
      document.getElementById('btn-voz').textContent = '🎤';
      grabando = false;
    };
    recognition.start();
    grabando = true;
  }
}
</script>
</body>
</html>
